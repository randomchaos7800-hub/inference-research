# Boundary Labs Status Dashboard — watched items
# Add/remove agents, services, and timers here.
# main.py reads this at startup — restart the dashboard service after editing.

agents:
  - id: harness-api
    label: Frank API
    scope: user
  - id: mike
    label: Mike
    scope: user
  - id: mike-irc
    label: Mike IRC
    scope: user
  - id: mike-irchighway
    label: Mike Highway
    scope: user
  - id: hermes-monitor
    label: Hermes Monitor
    scope: user

services:
  - id: nginx
    label: nginx
    scope: system
  - id: tailscaled
    label: Tailscale
    scope: system
  - id: postgresql
    label: PostgreSQL
    scope: system
  - id: vaultwarden
    label: Vaultwarden
    scope: system
  - id: forgejo
    label: Forgejo
    scope: system
  - id: jellyfin
    label: Jellyfin
    scope: system
  - id: paperless-web
    label: Paperless
    scope: system
  - id: adguardhome
    label: AdGuard
    scope: system

# systemd user timers — stale_hours is how long since last trigger before yellow dot
timers:
  - unit: pandorica-extract.timer
    label: pandorica-extract
    stale_hours: 26
  - unit: pandorica-sync.timer
    label: pandorica-sync
    stale_hours: 26
  - unit: chronicle.timer
    label: chronicle
    stale_hours: 26
  - unit: hourly-ops-check.timer
    label: hourly-ops-check
    stale_hours: 2
  - unit: nightly-context-sync.timer
    label: nightly-context-sync
    stale_hours: 26
  - unit: claude-token-refresh.timer
    label: claude-token-refresh
    stale_hours: 6
  - unit: mike-beat.timer
    label: mike-beat
    stale_hours: 3
  - unit: mike-daily-report.timer
    label: mike-daily-report
    stale_hours: 26
  - unit: mike-lighthouse.timer
    label: mike-lighthouse
    stale_hours: 26
  - unit: mike-consolidation.timer
    label: mike-consolidation
    stale_hours: 26
  - unit: cha0tikwiki-compile.timer
    label: wiki-compile
    stale_hours: 26
  - unit: morning-briefing.timer
    label: morning-briefing
    stale_hours: 26
  - unit: arxiv-sweep.timer
    label: arxiv-sweep
    stale_hours: 26
  - unit: daily-research-brief.timer
    label: daily-research-brief
    stale_hours: 26
  - unit: tower-watchdog.timer
    label: tower-watchdog
    stale_hours: 0.2
  - unit: overnight-status.timer
    label: overnight-status
    stale_hours: 26
  - unit: recall-summarization.timer
    label: recall-summarization
    stale_hours: 26
  - unit: x-post-morning.timer
    label: x-post-morning
    stale_hours: 26
  - unit: x-post-afternoon.timer
    label: x-post-afternoon
    stale_hours: 26
  - unit: weekly-essay-brief.timer
    label: weekly-essay-brief
    stale_hours: 216
  - unit: wiki-growth.timer
    label: wiki-growth
    stale_hours: 216

# artifact_checks — verify a job actually delivered, not just ran
# glob supports * and ** wildcards; ~ expands to home dir
# stale_hours: file must exist and be newer than this many hours
artifacts:
  - label: perf-log
    glob: "~/logs/perf/*-cha0tikhome.json"
    stale_hours: 26
  - label: chronicle
    glob: "/mnt/jellyfin-backups/records/*/*/*.md"
    stale_hours: 26
  - label: backup-system
    glob: "/mnt/jellyfin-backups/system/system-backup-*.tar.gz"
    stale_hours: 26
  - label: backup-www
    glob: "/mnt/jellyfin-backups/www/www-backup-*.tar.gz"
    stale_hours: 26
  - label: backup-vault
    glob: "/mnt/jellyfin-backups/vault/vault-backup-*.tar.gz"
    stale_hours: 26
  - label: backup-mike
    glob: "/mnt/jellyfin-backups/mike/mike-backup-*.tar.gz"
    stale_hours: 26
  - label: backup-repos
    glob: "/mnt/jellyfin-backups/repos/frank.git/FETCH_HEAD"
    stale_hours: 26
  - label: backup-forgejo
    glob: "/mnt/jellyfin-backups/forgejo/forgejo-backup-*.tar.gz"
    stale_hours: 26
